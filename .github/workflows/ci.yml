name: Portable CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        node: [20, 24]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Install launcher runtime
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y zsh
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: ${{ matrix.node }}
      - run: npm run gate
      - run: npm run artifact:check
      - run: node scripts/build-release.mjs --output "$RUNNER_TEMP/release-a"
      - run: node scripts/build-release.mjs --output "$RUNNER_TEMP/release-b"
      - run: cmp "$RUNNER_TEMP"/release-a/*.tgz "$RUNNER_TEMP"/release-b/*.tgz
